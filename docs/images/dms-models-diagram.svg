<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13243a"/>
      <stop offset="100%" stop-color="#0f1e31"/>
    </linearGradient>
    <style>
      .title { font: 700 52px 'Segoe UI', Arial, sans-serif; fill: #e8f1ff; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #a9c4e8; }
      .card-title { font: 700 27px 'Segoe UI', Arial, sans-serif; fill: #f0f6ff; }
      .card-text { font: 500 21px 'Segoe UI', Arial, sans-serif; fill: #bfd4f0; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9fc0e8; }
      .pill { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #e7f2ff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7fb3ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="85" text-anchor="middle" class="title">AI Models Used in This DMS Project</text>
  <text x="800" y="125" text-anchor="middle" class="subtitle">Webcam -> MediaPipe -> MLP / YOLO / Identity Similarity -> Alerts + Session Logs</text>

  <!-- Input -->
  <rect x="80" y="210" rx="18" ry="18" width="250" height="110" fill="#10253b" stroke="#4c7dbe" stroke-width="2"/>
  <text x="205" y="258" text-anchor="middle" class="card-title">Webcam Input</text>
  <text x="205" y="290" text-anchor="middle" class="small">base64 frames</text>

  <!-- MediaPipe -->
  <rect x="390" y="185" rx="20" ry="20" width="360" height="160" fill="url(#card)" stroke="#4f89d4" stroke-width="2.5"/>
  <text x="570" y="245" text-anchor="middle" class="card-title">MediaPipe Feature Extraction</text>
  <text x="570" y="282" text-anchor="middle" class="card-text">Face Mesh (478 landmarks)</text>
  <text x="570" y="315" text-anchor="middle" class="card-text">Hand Landmarks</text>

  <!-- MLP -->
  <rect x="820" y="80" rx="20" ry="20" width="690" height="240" fill="url(#card)" stroke="#67a3ff" stroke-width="2.5"/>
  <text x="1165" y="138" text-anchor="middle" class="card-title">MLP Classifiers (scikit-learn Pipeline)</text>
  <text x="1165" y="178" text-anchor="middle" class="card-text">StandardScaler -> MLPClassifier (256, 128) + ReLU</text>
  <rect x="860" y="205" rx="14" ry="14" width="150" height="44" fill="#1d3a5c" stroke="#78aef8"/>
  <rect x="1030" y="205" rx="14" ry="14" width="150" height="44" fill="#1d3a5c" stroke="#78aef8"/>
  <rect x="1200" y="205" rx="14" ry="14" width="150" height="44" fill="#1d3a5c" stroke="#78aef8"/>
  <rect x="1370" y="205" rx="14" ry="14" width="110" height="44" fill="#1d3a5c" stroke="#78aef8"/>
  <text x="935" y="233" text-anchor="middle" class="pill">Landmark</text>
  <text x="1105" y="233" text-anchor="middle" class="pill">Smoking</text>
  <text x="1275" y="233" text-anchor="middle" class="pill">Phone</text>
  <text x="1425" y="233" text-anchor="middle" class="pill">Hand</text>
  <text x="1165" y="283" text-anchor="middle" class="small">Outputs: label + probability</text>

  <!-- YOLO -->
  <rect x="820" y="360" rx="20" ry="20" width="330" height="175" fill="url(#card)" stroke="#ffad58" stroke-width="2.5"/>
  <text x="985" y="420" text-anchor="middle" class="card-title">YOLO Detector</text>
  <text x="985" y="457" text-anchor="middle" class="card-text">phone_yolo.pt</text>
  <text x="985" y="490" text-anchor="middle" class="small">Bounding boxes + confidence</text>

  <!-- Identity -->
  <rect x="1180" y="360" rx="20" ry="20" width="330" height="175" fill="url(#card)" stroke="#7bdcb5" stroke-width="2.5"/>
  <text x="1345" y="420" text-anchor="middle" class="card-title">Identity Verification</text>
  <text x="1345" y="457" text-anchor="middle" class="card-text">Embedding + Cosine Similarity</text>
  <text x="1345" y="490" text-anchor="middle" class="small">Telegram owner approval flow</text>

  <!-- Alerts -->
  <rect x="820" y="590" rx="20" ry="20" width="690" height="190" fill="url(#card)" stroke="#56c7ff" stroke-width="2.5"/>
  <text x="1165" y="652" text-anchor="middle" class="card-title">Runtime Outputs</text>
  <text x="1165" y="690" text-anchor="middle" class="card-text">Real-time alerts (phone / smoking / drowsy / identity)</text>
  <text x="1165" y="724" text-anchor="middle" class="card-text">Driving sessions + alert counters saved to MySQL</text>
  <text x="1165" y="756" text-anchor="middle" class="small">Displayed in React dashboard for demo/fleet reporting</text>

  <!-- Arrows -->
  <line x1="330" y1="265" x2="390" y2="265" stroke="#7fb3ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="225" x2="820" y2="180" stroke="#7fb3ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="265" x2="820" y2="445" stroke="#7fb3ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="295" x2="1180" y2="445" stroke="#7fb3ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="985" y1="535" x2="985" y2="590" stroke="#7fb3ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1345" y1="535" x2="1345" y2="590" stroke="#7fb3ff" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="800" y="855" text-anchor="middle" class="small">Project: AI Driver Monitoring System (DMS) - Flask + React + MediaPipe + scikit-learn + YOLO + MySQL</text>
</svg>
