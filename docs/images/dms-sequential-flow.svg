<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1426"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17314f"/>
      <stop offset="100%" stop-color="#122844"/>
    </linearGradient>
    <style>
      .title { font: 700 56px 'Segoe UI', Arial, sans-serif; fill: #eaf2ff; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #b6cae8; }
      .stepno { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .steptitle { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #f2f8ff; }
      .steptext { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #c2d7f3; }
      .footer { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #9fbddd; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#86b8ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="url(#bg)"/>

  <text x="900" y="80" text-anchor="middle" class="title">DMS Sequential AI Pipeline</text>
  <text x="900" y="120" text-anchor="middle" class="subtitle">End-to-end flow from webcam stream to alerts, owner decision, and session logs</text>

  <!-- Step 1 -->
  <rect x="80" y="220" rx="22" ry="22" width="290" height="220" fill="url(#card)" stroke="#5d90d6" stroke-width="2.5"/>
  <circle cx="130" cy="270" r="28" fill="#3a7bd5"/>
  <text x="130" y="281" text-anchor="middle" class="stepno">1</text>
  <text x="225" y="278" text-anchor="middle" class="steptitle">Capture</text>
  <text x="225" y="320" text-anchor="middle" class="steptext">Webcam frames</text>
  <text x="225" y="355" text-anchor="middle" class="steptext">from browser</text>
  <text x="225" y="390" text-anchor="middle" class="steptext">(React UI)</text>

  <!-- Step 2 -->
  <rect x="430" y="220" rx="22" ry="22" width="290" height="220" fill="url(#card)" stroke="#5d90d6" stroke-width="2.5"/>
  <circle cx="480" cy="270" r="28" fill="#3a7bd5"/>
  <text x="480" y="281" text-anchor="middle" class="stepno">2</text>
  <text x="575" y="278" text-anchor="middle" class="steptitle">Preprocess</text>
  <text x="575" y="320" text-anchor="middle" class="steptext">base64 decode</text>
  <text x="575" y="355" text-anchor="middle" class="steptext">resize / quality</text>
  <text x="575" y="390" text-anchor="middle" class="steptext">frame sampling</text>

  <!-- Step 3 -->
  <rect x="780" y="220" rx="22" ry="22" width="290" height="220" fill="url(#card)" stroke="#65a6ff" stroke-width="2.5"/>
  <circle cx="830" cy="270" r="28" fill="#4f8ff0"/>
  <text x="830" y="281" text-anchor="middle" class="stepno">3</text>
  <text x="925" y="278" text-anchor="middle" class="steptitle">Feature Extract</text>
  <text x="925" y="320" text-anchor="middle" class="steptext">MediaPipe Face Mesh</text>
  <text x="925" y="355" text-anchor="middle" class="steptext">+ Hand Landmarks</text>
  <text x="925" y="390" text-anchor="middle" class="steptext">numeric vectors</text>

  <!-- Step 4 -->
  <rect x="1130" y="220" rx="22" ry="22" width="290" height="220" fill="url(#card)" stroke="#f0b35a" stroke-width="2.5"/>
  <circle cx="1180" cy="270" r="28" fill="#d9983d"/>
  <text x="1180" y="281" text-anchor="middle" class="stepno">4</text>
  <text x="1275" y="278" text-anchor="middle" class="steptitle">Inference</text>
  <text x="1275" y="320" text-anchor="middle" class="steptext">MLP classifiers</text>
  <text x="1275" y="355" text-anchor="middle" class="steptext">+ YOLO phone detect</text>
  <text x="1275" y="390" text-anchor="middle" class="steptext">label + confidence</text>

  <!-- Step 5 -->
  <rect x="1480" y="220" rx="22" ry="22" width="240" height="220" fill="url(#card)" stroke="#7acfa5" stroke-width="2.5"/>
  <circle cx="1528" cy="270" r="28" fill="#4aad7f"/>
  <text x="1528" y="281" text-anchor="middle" class="stepno">5</text>
  <text x="1600" y="278" text-anchor="middle" class="steptitle">Decision</text>
  <text x="1600" y="320" text-anchor="middle" class="steptext">threshold</text>
  <text x="1600" y="355" text-anchor="middle" class="steptext">hysteresis</text>
  <text x="1600" y="390" text-anchor="middle" class="steptext">state update</text>

  <!-- Arrows top row -->
  <line x1="370" y1="330" x2="430" y2="330" stroke="#86b8ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="720" y1="330" x2="780" y2="330" stroke="#86b8ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1070" y1="330" x2="1130" y2="330" stroke="#86b8ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1420" y1="330" x2="1480" y2="330" stroke="#86b8ff" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Bottom outputs -->
  <rect x="140" y="560" rx="20" ry="20" width="480" height="260" fill="url(#card)" stroke="#66c6ff" stroke-width="2.5"/>
  <text x="380" y="625" text-anchor="middle" class="steptitle">Realtime Driver Alerts</text>
  <text x="380" y="675" text-anchor="middle" class="steptext">Phone / Smoking / Drowsy</text>
  <text x="380" y="712" text-anchor="middle" class="steptext">UI warning + audio alarm</text>
  <text x="380" y="748" text-anchor="middle" class="steptext">Socket + REST updates</text>

  <rect x="660" y="560" rx="20" ry="20" width="520" height="260" fill="url(#card)" stroke="#7ad7b0" stroke-width="2.5"/>
  <text x="920" y="625" text-anchor="middle" class="steptitle">Identity &amp; Owner Approval</text>
  <text x="920" y="675" text-anchor="middle" class="steptext">embedding + cosine similarity</text>
  <text x="920" y="712" text-anchor="middle" class="steptext">Telegram Accept / Reject flow</text>
  <text x="920" y="748" text-anchor="middle" class="steptext">lock/unlock driving state</text>

  <rect x="1220" y="560" rx="20" ry="20" width="440" height="260" fill="url(#card)" stroke="#8ab3ff" stroke-width="2.5"/>
  <text x="1440" y="625" text-anchor="middle" class="steptitle">Driving Session Logs</text>
  <text x="1440" y="675" text-anchor="middle" class="steptext">start / end timestamps</text>
  <text x="1440" y="712" text-anchor="middle" class="steptext">alert counters by type</text>
  <text x="1440" y="748" text-anchor="middle" class="steptext">stored in MySQL</text>

  <!-- Connect decision to outputs -->
  <line x1="1600" y1="440" x2="380" y2="560" stroke="#86b8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1600" y1="440" x2="920" y2="560" stroke="#86b8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1600" y1="440" x2="1440" y2="560" stroke="#86b8ff" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="900" y="920" text-anchor="middle" class="footer">Stack: React + Flask + MediaPipe + scikit-learn MLP + YOLO + MySQL + Telegram Bot</text>
</svg>
